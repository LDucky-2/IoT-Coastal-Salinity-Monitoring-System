<!DOCTYPE html>
<html>
<head>
    <title>Coastal Monitor Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #stats { display: flex; justify-content: center; gap: 20px; margin: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #map { height: 400px; width: 80%; margin: 0 auto; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Coastal Monitoring Station</h1>
    <div id="stats">
        <div class="card"><h3>Temp</h3><p id="temp">--</p>°C</div>
        <div class="card"><h3>Salinity</h3><p id="sal">--</p> ppt</div>
        <div class="card"><h3>TDS</h3><p id="tds">--</p> mg/L</div>
    </div>
    <div id="map"></div>

    <script>
        var socket = io();
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        socket.on('serial_data', function(msg) {
            // Split CSV: Temp, TDS, Salinity, Lat, Lng
            let data = msg.value.split(',');
            if(data.length >= 5) {
                document.getElementById('temp').innerText = data[0];
                document.getElementById('tds').innerText = data[1];
                document.getElementById('sal').innerText = data[2];
                
                let lat = parseFloat(data[3]);
                let lng = parseFloat(data[4]);

                if(lat !== 0) {
                    let newLatLng = new L.LatLng(lat, lng);
                    marker.setLatLng(newLatLng);
                    map.panTo(newLatLng);
                }
            }
        });
    </script>
</body>
</html>
